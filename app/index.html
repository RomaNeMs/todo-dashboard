<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ToDo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ToDo">
<meta name="theme-color" content="#F0EFF9">
<!-- touch-icon-v2.png = same purple checkmark under a NEW filename. iOS keeps a
     separate home-screen icon cache (not in Website Data) keyed by icon URL, and
     it was serving a stale grey copy; a fresh filename (no query string — some
     iOS versions ignore icon URLs with one) forces a real fetch. -->
<link rel="apple-touch-icon" sizes="180x180" href="/todo-dashboard/touch-icon-v2.png">
<link rel="icon" type="image/png" sizes="192x192" href="/todo-dashboard/icon-192.png">
<!-- NO manifest link, deliberately: with only the classic apple-mobile-web-app
     meta tags, iOS keeps ALL navigation inside the full-screen standalone
     webview — including the cross-origin redirect to script.google.com below.
     With a manifest, that redirect would be "out of scope" and iOS would slap
     browser chrome on it. (v2: redirect architecture — the old iframe approach
     died when Google started serving frame-blocking headers on /exec pages.) -->
<style>
  :root {
    --bg: #F0EFF9; --paper: #FFFFFF; --ink: #1A1835; --muted: #7874A8;
    --line: #DDD9F1; --accent: #5B4FCF; --red: #DC2626; --red-light: #FCE7E7;
  }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    color: var(--ink); -webkit-font-smoothing: antialiased; }

  #gate { min-height: 100dvh; display: grid; place-items: center; padding: 24px; box-sizing: border-box; }
  .card {
    width: 340px; max-width: 100%; text-align: center; background: var(--paper);
    border: 1px solid var(--line); border-radius: 16px; padding: 36px 30px 26px;
    box-shadow: 0 1px 2px rgba(26,24,53,0.05), 0 4px 16px rgba(26,24,53,0.07);
  }
  .card.shake { animation: shake .4s; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  .mark {
    width: 54px; height: 54px; border-radius: 16px; margin: 0 auto 14px;
    background: linear-gradient(180deg, #6E62E0, #5346C4);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.28), 0 2px 6px rgba(91,79,207,0.32);
    display: grid; place-items: center;
  }
  .mark svg { width: 28px; height: 28px; }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; margin: 0 0 6px; }
  p  { color: var(--muted); font-size: 13px; margin: 0 0 20px; line-height: 1.5; }
  input {
    width: 100%; box-sizing: border-box; font-size: 20px; text-align: center; letter-spacing: 6px;
    padding: 12px; border: 1px solid var(--line); border-radius: 10px; outline: none;
    background: var(--bg); margin-bottom: 12px; color: var(--ink);
    font-family: 'SF Mono', ui-monospace, monospace;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,79,207,0.12); }
  input.err { border-color: var(--red); background: var(--red-light); }
  button {
    width: 100%; padding: 12px; font-size: 14px; font-weight: 600; color: #fff;
    border: none; border-radius: 10px; cursor: pointer;
    background: linear-gradient(180deg, #6E62E0, #5346C4);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.28), 0 2px 6px rgba(91,79,207,0.32);
  }
  button:active { transform: scale(0.97); }
  .hint { font-size: 10px; color: #A5A1C9; letter-spacing: 0.8px; text-transform: uppercase; margin-top: 16px;
    font-family: 'SF Mono', ui-monospace, monospace; }
  .opening { color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<div id="gate">
  <form class="card" id="card" onsubmit="return go(event)">
    <div class="mark">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M28 52 L44 68 L72 34" stroke="white" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>ToDo</h1>
    <div id="body">
      <p>Enter your passcode to open the dashboard on this device.</p>
      <input id="pw" type="password" inputmode="text" autocomplete="current-password" placeholder="passcode" autofocus>
      <button type="submit">Unlock</button>
      <div class="hint">Remembered on this device after first unlock</div>
    </div>
  </form>
</div>

<script>
// ── Encrypted vault ─────────────────────────────────────────────────────────
// Holds the dashboard /exec URL (incl. access key) as an AES-256-GCM blob.
// The passcode decrypts it; the page then NAVIGATES to the dashboard
// (location.replace) — no iframe, so Google's frame-blocking headers on
// script.google.com can't break anything.
const VAULT = { salt: "tW5x0oo6HeMqRFVsSPQCeA==", iv: "e7s9W1qtYAFZ98hR", data: "njZM3oDSzdkpwID+C85pVhcmS/6qMgn010/pMXxyJUqhYHkhZqhHIfszDDngPI0WaP+42BHfAiC995wJOEmgYjEVqh/Ybt2vkVnBQrAO036v92sxtwHUiRqOl7LTmdpm3BxUJM1WU05yNDFVdrflPMeAGJ99zAimvCsrZBLfqNn6SrV1EHl9I+M64hu9s71drwPR6f61W1/MiUyod/KlQA8Yk0pRx5Bpfko7NVmI9gff7ZscxQ==" };

// v2: bumped so devices that remembered the old (iframe-era) entry re-prompt once.
const LS_KEY = 'todo.exec.url.v2';

function b64d(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }

async function deriveKey(pass, salt) {
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 310000, hash: 'SHA-256' },
    base, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
}

async function decryptVault(pass) {
  const key = await deriveKey(pass, b64d(VAULT.salt));
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64d(VAULT.iv) }, key, b64d(VAULT.data));
  return new TextDecoder().decode(plain);
}

// Standalone = launched from the home-screen icon. In a normal Safari tab we
// deliberately DON'T auto-redirect: iOS takes the home-screen icon from the
// page you're on when you tap "Add to Home Screen", so the branded gate page
// must stay visible in Safari — otherwise you get Google's grey icon.
const IS_STANDALONE = (navigator.standalone === true) ||
  (window.matchMedia && matchMedia('(display-mode: standalone)').matches);

let _url = null;

function open_(url) {
  document.getElementById('body').innerHTML = '<p class="opening">Opening the dashboard…</p>';
  location.replace(url);
}

function showOpenCard() {
  document.getElementById('body').innerHTML =
    '<p>Unlocked on this device.</p>' +
    '<button type="button" onclick="open_(_url)">Open dashboard</button>' +
    '<div class="hint">Share → Add to Home Screen on THIS page<br>to install the app with its icon</div>';
}

async function go(e) {
  e.preventDefault();
  const pw = document.getElementById('pw');
  try {
    _url = await decryptVault(pw.value);
    try { localStorage.setItem(LS_KEY, _url); } catch (_) {}
    if (IS_STANDALONE) open_(_url); else showOpenCard();
  } catch (_) {
    const card = document.getElementById('card');
    pw.classList.add('err'); card.classList.add('shake');
    pw.value = '';
    setTimeout(() => { pw.classList.remove('err'); card.classList.remove('shake'); }, 500);
  }
  return false;
}

// Boot: home-screen app + remembered → straight to the dashboard.
// Safari tab + remembered → show the Open button (page stays for icon-adding).
(function () {
  let saved = null;
  try { saved = localStorage.getItem(LS_KEY); } catch (_) {}
  if (!saved) return;
  _url = saved;
  if (IS_STANDALONE) open_(saved); else showOpenCard();
})();
</script>
</body>
</html>
